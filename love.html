<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рЯТХ A Question For You рЯТХ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --pink-deep: #e8749a;
            --pink-mid: #f4a7c3;
            --pink-light: #fce4ec;
            --pink-pale: #fff0f5;
            --pink-accent: #f06292;
            --cream: #fff8fb;
            --text-dark: #5a2d4c;
            --text-mid: #9c4572;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--pink-pale);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* вФАвФА Floating hearts background вФАвФА */
        .hearts-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            animation: floatUp linear infinite;
            opacity: 0.18;
            user-select: none;
            pointer-events: none;
        }

        .heart-float.tiny-secret {
            opacity: 0.7;
            cursor: pointer;
            pointer-events: all;
            z-index: 9999;
            position: fixed;
            filter: drop-shadow(0 0 4px var(--pink-mid));
            transition: transform 0.15s;
            animation: floatUpSlow linear infinite;
        }

        .heart-float.tiny-secret:hover {
            opacity: 1;
            transform: scale(1.3);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.18;
            }

            90% {
                opacity: 0.18;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes floatUpSlow {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0.55;
            }

            100% {
                transform: translateY(-10vh) rotate(20deg);
                opacity: 0.55;
            }
        }

        /* вФАвФА Page shells вФАвФА */
        .page {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* вФАвФА Page 1: Question вФАвФА */
        #page1 {
            padding: 40px 20px;
        }

        .question-card {
            background: var(--white);
            border-radius: 32px;
            padding: 56px 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(232, 116, 154, 0.18);
            position: relative;
        }

        .question-card .big-heart {
            font-size: 64px;
            display: block;
            margin-bottom: 20px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.12);
            }
        }

        .question-label {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            color: var(--pink-deep);
            line-height: 1.3;
            margin-bottom: 40px;
        }

        .btn-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: nowrap;
            position: relative;
            min-height: 60px;
        }

        .btn-yes,
        .btn-no {
            padding: 14px 40px;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-accent));
            color: white;
            box-shadow: 0 4px 20px rgba(232, 116, 154, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.07);
            box-shadow: 0 6px 28px rgba(232, 116, 154, 0.55);
        }

        .btn-no {
            background: var(--pink-light);
            color: var(--text-mid);
            box-shadow: 0 2px 12px rgba(232, 116, 154, 0.12);
            position: absolute;
        }

        .btn-no:hover {
            transform: scale(1.04);
        }

        /* вФАвФА Page 2: Calendar вФАвФА */
        #page2 {
            padding: 40px 20px;
        }

        .cal-card {
            background: var(--white);
            border-radius: 32px;
            padding: 44px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(232, 116, 154, 0.18);
        }

        .cal-card .section-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .cal-title {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            color: var(--pink-deep);
            margin-bottom: 4px;
        }

        .cal-subtitle {
            color: var(--text-mid);
            font-size: 1rem;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .calendar-wrapper {
            margin-bottom: 24px;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .cal-month-label {
            font-family: 'Pacifico', cursive;
            color: var(--pink-deep);
            font-size: 1.15rem;
        }

        .cal-nav {
            background: var(--pink-light);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--pink-deep);
            font-weight: bold;
            transition: background 0.15s;
        }

        .cal-nav:hover {
            background: var(--pink-mid);
            color: white;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-day-name {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--pink-deep);
            padding: 6px 0;
            text-align: center;
        }

        .cal-day {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            color: var(--text-dark);
            background: transparent;
            border: none;
        }

        .cal-day.past {
            color: #ccc;
            cursor: not-allowed;
        }

        .cal-day.today {
            border: 2px solid var(--pink-mid);
            color: var(--pink-deep);
        }

        .cal-day.available:hover {
            background: var(--pink-light);
        }

        .cal-day.selected {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-accent));
            color: white;
        }

        .cal-day.empty {
            cursor: default;
        }

        .cal-day.outrange {
            color: #ddd;
            cursor: not-allowed;
        }

        .time-picker {
            display: none;
        }

        .time-picker.visible {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .time-label {
            font-weight: 800;
            color: var(--text-mid);
            margin-bottom: 14px;
            font-size: 1rem;
        }

        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 22px;
        }

        .time-slot {
            padding: 9px 18px;
            border-radius: 50px;
            border: 2px solid var(--pink-light);
            background: var(--pink-pale);
            color: var(--text-mid);
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .time-slot:hover {
            border-color: var(--pink-mid);
            background: var(--pink-light);
        }

        .time-slot.selected {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-accent));
            color: white;
            border-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-deep), var(--pink-accent));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(232, 116, 154, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            display: inline-block;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary:not(:disabled):hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(232, 116, 154, 0.5);
        }

        /* вФАвФА Page 3: Food вФАвФА */
        #page3 {
            padding: 40px 20px;
        }

        .food-card {
            background: var(--white);
            border-radius: 32px;
            padding: 44px 40px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(232, 116, 154, 0.18);
        }

        .food-title {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            color: var(--pink-deep);
            margin-bottom: 8px;
        }

        .food-sub {
            color: var(--text-mid);
            font-weight: 600;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .food-item {
            background: var(--pink-pale);
            border: 2.5px solid var(--pink-light);
            border-radius: 20px;
            padding: 18px 10px 14px;
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
        }

        .food-item:hover {
            border-color: var(--pink-mid);
            background: var(--pink-light);
            transform: translateY(-3px);
        }

        .food-item.selected {
            border-color: var(--pink-deep);
            background: linear-gradient(135deg, #fce4ec, #ffd6e7);
            box-shadow: 0 4px 16px rgba(232, 116, 154, 0.25);
            transform: translateY(-3px);
        }

        .food-icon {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 8px;
        }

        .food-name {
            font-weight: 800;
            color: var(--text-dark);
            font-size: 0.88rem;
        }

        /* вФАвФА Page 4: Final вФАвФА */
        #page4 {
            padding: 40px 20px;
        }

        .final-card {
            background: var(--white);
            border-radius: 32px;
            padding: 52px 44px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 48px rgba(232, 116, 154, 0.22);
        }

        .final-yay {
            font-family: 'Pacifico', cursive;
            font-size: 2.6rem;
            color: var(--pink-deep);
            margin-bottom: 8px;
            animation: pulse 1.3s ease-in-out infinite;
        }

        .final-emojis {
            font-size: 2rem;
            margin-bottom: 28px;
            letter-spacing: 4px;
        }

        .final-details {
            background: var(--pink-pale);
            border-radius: 20px;
            padding: 24px 28px;
            margin-bottom: 24px;
            text-align: left;
        }

        .final-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px dashed var(--pink-light);
        }

        .final-row:last-child {
            border-bottom: none;
        }

        .final-row-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .final-row-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--pink-mid);
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .final-row-value {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .final-message {
            font-family: 'Pacifico', cursive;
            font-size: 1.35rem;
            color: var(--pink-deep);
            margin-top: 10px;
            line-height: 1.5;
        }

        .confetti-burst {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 18px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Corner reset button -->
    <button onclick="resetAll()" title="Reset рЯФД"
        style="position:fixed;bottom:14px;right:14px;z-index:9999;background:rgba(255,255,255,0.8);border:2px solid #f4a7c3;border-radius:50%;width:40px;height:40px;font-size:1.1rem;cursor:pointer;box-shadow:0 2px 12px rgba(232,116,154,0.25);backdrop-filter:blur(4px);">рЯФД</button>

    <!-- Floating hearts background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- PAGE 1: The Question -->
    <div class="page active" id="page1">
        <div class="question-card">
            <span class="big-heart">рЯТЦ</span>
            <div class="question-label">Will you go on a<br>date with me? рЯМЄ</div>
            <div class="btn-row" id="btnRow">
                <button class="btn-yes" onclick="goToPage2()">Yes рЯТХ</button>
                <button class="btn-no" id="noBtn" onmouseover="runAwayNo(event)" ontouchstart="runAwayNo(event)">No
                    рЯЩИ</button>
            </div>
        </div>
    </div>

    <!-- PAGE 2: Calendar -->
    <div class="page" id="page2">
        <div class="cal-card">
            <span class="section-emoji">рЯУЕ</span>
            <div class="cal-title">So... when are you free?</div>
            <div class="cal-subtitle">Pick a date... рЯТМ</div>

            <div class="calendar-wrapper">
                <div class="cal-header">
                    <button class="cal-nav" id="calPrev" onclick="changeMonth(-1)">вАє</button>
                    <span class="cal-month-label" id="calMonthLabel"></span>
                    <button class="cal-nav" id="calNext" onclick="changeMonth(1)">вАЇ</button>
                </div>
                <div class="cal-grid" id="calGrid"></div>
            </div>

            <button class="btn-primary" id="btnSetDate" disabled onclick="showTimePicker()">Set Date рЯТЭ</button>

            <div class="time-picker" id="timePicker">
                <div
                    style="margin-top:28px; margin-bottom:14px; border-top: 2px dashed var(--pink-light); padding-top:22px;">
                    <div class="time-label">What time? рЯХР</div>
                    <div class="time-slots" id="timeSlots"></div>
                    <button class="btn-primary" id="btnSetTime" disabled onclick="goToPage3()">Set Date Time рЯМє</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE 3: Food -->
    <div class="page" id="page3">
        <div class="food-card">
            <span class="section-emoji" style="font-size:42px;display:block;margin-bottom:12px;">рЯНљпЄП</span>
            <div class="food-title">What are we feeling?</div>
            <div class="food-sub">Pick something delicious! рЯШН</div>
            <div class="food-grid" id="foodGrid"></div>
            <button class="btn-primary" id="btnFoodNext" disabled onclick="goToPage4()">Next рЯТЮ</button>
        </div>
    </div>

    <!-- PAGE 4: Final -->
    <div class="page" id="page4">
        <div class="final-card">
            <span class="confetti-burst">рЯОК</span>
            <div class="final-yay">YAYYY!!!! рЯ•≥</div>
            <div class="final-emojis">рЯТЦ рЯТХ рЯМЄ рЯТЧ рЯТЭ</div>
            <div class="final-details" id="finalDetails"></div>
            <div class="final-message">I can't wait to see you! рЯМєвЬ®</div>
        </div>
    </div>

    <script>
        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           STATE
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        const STATE_KEY = 'datePlannerState_v1';
        let state = {
            page: 1,
            selectedDate: null,      // { year, month, day }
            selectedTime: null,      // e.g. "7:00 PM"
            selectedFood: null,      // { icon, name }
            calViewYear: null,
            calViewMonth: null,
        };

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           PERSIST / LOAD
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        function saveState() {
            localStorage.setItem(STATE_KEY, JSON.stringify(state));
        }
        function loadState() {
            try {
                const raw = localStorage.getItem(STATE_KEY);
                if (raw) state = JSON.parse(raw);
            } catch (e) { /* fresh */ }
        }
        function resetAll() {
            if (!confirm('Reset everything and start over? рЯФД')) return;
            localStorage.removeItem(STATE_KEY);
            location.reload();
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           FLOATING HEARTS
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        const heartShapes = ['вЭ§пЄП', 'рЯТЦ', 'рЯТЧ', 'рЯТУ', 'рЯТЮ', 'рЯТЭ', 'рЯТХ', 'рЯ©Ј', 'вЩ•пЄП', 'рЯТЯ', 'рЯТШ', 'рЯМЄ'];

        function spawnHeart(isSecret) {
            const el = document.createElement('span');
            el.className = 'heart-float' + (isSecret ? ' tiny-secret' : '');
            const left = Math.random() * 88;
            const size = isSecret ? 16 : (18 + Math.random() * 44);
            const dur = isSecret ? (22 + Math.random() * 10) : (10 + Math.random() * 20);
            const delay = Math.random() * 15;
            el.style.cssText = `left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:-${delay}s;`;
            el.textContent = isSecret ? 'рЯТЧ' : heartShapes[Math.floor(Math.random() * heartShapes.length)];
            if (isSecret) {
                el.title = 'psst... click me рЯ§Ђ';
                el.addEventListener('click', function (e) { e.stopPropagation(); resetAll(); });
                el.addEventListener('touchend', function (e) { e.stopPropagation(); e.preventDefault(); resetAll(); });
            }
            return el;
        }

        function buildHearts() {
            const bg = document.getElementById('heartsBg');
            bg.innerHTML = '';
            // 28 regular hearts
            for (let i = 0; i < 28; i++) bg.appendChild(spawnHeart(false));
            // 1 tiny secret heart
            bg.appendChild(spawnHeart(true));
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           PAGE NAVIGATION
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        function showPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + n).classList.add('active');
        }

        function goToPage2() {
            state.page = 2;
            saveState();
            showPage(2);
            renderCalendar();
        }

        function goToPage3() {
            state.page = 3;
            saveState();
            showPage(3);
        }

        function goToPage4() {
            state.page = 4;
            saveState();
            showPage(4);
            renderFinal();
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           NO BUTTON ESCAPE
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        function runAwayNo(e) {
            const btn = document.getElementById('noBtn');
            const row = document.getElementById('btnRow');
            const rowRect = row.getBoundingClientRect();
            const card = row.closest('.question-card');
            const cardRect = card.getBoundingClientRect();

            const maxX = cardRect.width - 90;
            const maxY = cardRect.height - 40;
            const minX = -20;
            const minY = -80;

            let newX, newY, tries = 0;
            do {
                newX = minX + Math.random() * (maxX - minX);
                newY = minY + Math.random() * (maxY - minY);
                tries++;
            } while (tries < 20);

            btn.style.position = 'absolute';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            btn.style.transition = 'left 0.18s, top 0.18s';
            if (e) { e.preventDefault(); }
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           CALENDAR
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        const DAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        function initCalView() {
            const today = new Date();
            if (!state.calViewYear) {
                state.calViewYear = today.getFullYear();
                state.calViewMonth = today.getMonth(); // 0-based
            }
        }

        function changeMonth(dir) {
            let m = state.calViewMonth + dir;
            let y = state.calViewYear;
            if (m > 11) { m = 0; y++; }
            if (m < 0) { m = 11; y--; }
            const today = new Date();
            const todayY = today.getFullYear(), todayM = today.getMonth();
            // don't go past today's month
            if (y < todayY || (y === todayY && m < todayM)) return;
            // don't go more than 2 months ahead
            const maxM = todayM + 2, maxY = todayY + Math.floor((todayM + 2) / 12);
            const normMax = new Date(todayY, todayM + 2, 1);
            const normView = new Date(y, m, 1);
            if (normView > normMax) return;
            state.calViewYear = y;
            state.calViewMonth = m;
            renderCalendar();
        }

        function renderCalendar() {
            initCalView();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            const maxDate = new Date(today); maxDate.setDate(today.getDate() + 30);

            const y = state.calViewYear, m = state.calViewMonth;
            document.getElementById('calMonthLabel').textContent = MONTH_NAMES[m] + ' ' + y;

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';

            DAY_NAMES.forEach(d => {
                const el = document.createElement('div');
                el.className = 'cal-day-name';
                el.textContent = d;
                grid.appendChild(el);
            });

            for (let i = 0; i < firstDay; i++) {
                const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(y, m, d);
                const el = document.createElement('button');
                el.className = 'cal-day';
                el.textContent = d;

                const isSel = state.selectedDate &&
                    state.selectedDate.year === y &&
                    state.selectedDate.month === m &&
                    state.selectedDate.day === d;
                const isToday = date.getTime() === today.getTime();
                const isPast = date < tomorrow;
                const isOut = date > maxDate;

                if (isSel) { el.className += ' selected'; }
                else if (isPast || isOut) { el.className += (isPast ? ' past' : ' outrange'); el.disabled = true; }
                else {
                    el.className += (isToday ? ' today' : ' available');
                    el.onclick = () => selectDate(y, m, d);
                }
                grid.appendChild(el);
            }

            document.getElementById('calPrev').disabled = (y === today.getFullYear() && m === today.getMonth());
        }

        function selectDate(y, m, d) {
            state.selectedDate = { year: y, month: m, day: d };
            state.selectedTime = null;
            document.getElementById('timePicker').classList.remove('visible');
            document.getElementById('btnSetTime').disabled = true;
            renderCalendar();
            document.getElementById('btnSetDate').disabled = false;
        }

        function showTimePicker() {
            const tp = document.getElementById('timePicker');
            tp.classList.add('visible');
            renderTimeSlots();
            document.getElementById('btnSetDate').disabled = true;
        }

        function renderTimeSlots() {
            const slots = ['11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM', '5:00 PM', '6:00 PM', '7:00 PM', '8:00 PM'];
            const container = document.getElementById('timeSlots');
            container.innerHTML = '';
            slots.forEach(t => {
                const el = document.createElement('button');
                el.className = 'time-slot' + (state.selectedTime === t ? ' selected' : '');
                el.textContent = t;
                el.onclick = () => { state.selectedTime = t; renderTimeSlots(); document.getElementById('btnSetTime').disabled = false; };
                container.appendChild(el);
            });
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           FOOD
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        const FOODS = [
            { icon: 'рЯНХ', name: 'Pizza' },
            { icon: 'рЯНФ', name: 'Burger' },
            { icon: 'рЯНЭ', name: 'Pasta' },
            { icon: 'рЯМЃ', name: 'Tacos' },
            { icon: 'рЯН±', name: 'Set Menu' },
            { icon: 'рЯН£', name: 'Sushi' },
            { icon: 'рЯ•Ч', name: 'Salad' },
            { icon: 'рЯНЬ', name: 'Ramen' },
            { icon: 'рЯ•Ш', name: 'Stew' },
        ];

        function renderFoods() {
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = '';
            FOODS.forEach(f => {
                const el = document.createElement('div');
                el.className = 'food-item' + (state.selectedFood && state.selectedFood.name === f.name ? ' selected' : '');
                el.innerHTML = `<span class="food-icon">${f.icon}</span><div class="food-name">${f.name}</div>`;
                el.onclick = () => { state.selectedFood = f; renderFoods(); document.getElementById('btnFoodNext').disabled = false; };
                grid.appendChild(el);
            });
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           FINAL PAGE
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        function renderFinal() {
            const MONTH_NAMES_SHORT = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const sd = state.selectedDate;
            const dateStr = sd ? `${DAY_NAMES[new Date(sd.year, sd.month, sd.day).getDay()]}, ${MONTH_NAMES_SHORT[sd.month]} ${sd.day}, ${sd.year}` : 'вАФ';

            document.getElementById('finalDetails').innerHTML = `
      <div class="final-row">
        <span class="final-row-icon">рЯУЕ</span>
        <div><span class="final-row-label">Date</span><span class="final-row-value">${dateStr}</span></div>
      </div>
      <div class="final-row">
        <span class="final-row-icon">рЯХР</span>
        <div><span class="final-row-label">Time</span><span class="final-row-value">${state.selectedTime || 'вАФ'}</span></div>
      </div>
      <div class="final-row">
        <span class="final-row-icon">${state.selectedFood ? state.selectedFood.icon : 'рЯНљпЄП'}</span>
        <div><span class="final-row-label">We're having</span><span class="final-row-value">${state.selectedFood ? state.selectedFood.name : 'вАФ'}</span></div>
      </div>
    `;
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           RESTORE STATE ON LOAD
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        function restoreState() {
            loadState();
            buildHearts();

            const p = state.page || 1;

            if (p >= 4 && state.selectedDate && state.selectedTime && state.selectedFood) {
                showPage(4);
                renderFinal();
            } else if (p === 3 && state.selectedDate && state.selectedTime) {
                showPage(3);
                renderFoods();
                if (state.selectedFood) document.getElementById('btnFoodNext').disabled = false;
            } else if (p === 2 && state.selectedDate) {
                showPage(2);
                initCalView();
                renderCalendar();
                // re-show time picker if date already picked
                const tp = document.getElementById('timePicker');
                tp.classList.add('visible');
                renderTimeSlots();
                if (state.selectedTime) document.getElementById('btnSetTime').disabled = false;
            } else if (p === 2) {
                showPage(2);
                initCalView();
                renderCalendar();
            } else {
                showPage(1);
            }
        }

        /* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
           INIT
        вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
        window.addEventListener('load', restoreState);

        // Also pre-render food grid when page 3 is first visited
        const _origGoToPage3 = goToPage3;
        goToPage3 = function () {
            _origGoToPage3();
            renderFoods();
        };
    </script>
</body>
